<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nest 🏡</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

</head>


<body>


<div class="app">


<!-- LOGIN SCREEN -->

<section id="login-screen">


<div class="logo">

<h1>NEST 🏡</h1>

<p>Armanda & Nick</p>

</div>



<div class="card">


<h2>Welcome Back</h2>


<input
id="name"
type="text"
placeholder="Your Name">

<input 
id="email"
type="email"
placeholder="Email">


<input
id="password"
type="password"
placeholder="Password">



<button id="login-btn">
Login
</button>



<button id="signup-btn">
Create Account
</button>



<p id="message"></p>


</div>


</section>







<!-- APP SCREEN -->

<section id="app-screen">


<header>

<h1>NEST 🏡</h1>

<p id="user-name">
Welcome
</p>

</header>






<!-- HOME PAGE -->

<div id="home" class="page active">


<div class="card">

<h3>Remaining</h3>

<h1 id="remaining">
$0.00
</h1>

</div>




<div class="card">

<h3>Upcoming Bills</h3>

<div id="upcoming">

No bills yet

</div>


</div>


</div>








<!-- BILLS PAGE -->


<div id="bills" class="page">


<h2>Bills</h2>



<button id="open-bill">
+ Add Bill
</button>




<div id="bill-form" class="card hidden">


<input
id="bill-name"
placeholder="Bill Name">



<input
id="bill-amount"
type="number"
placeholder="Amount">



<input
id="bill-date"
type="date">



<select id="bill-person">

<option>
Armanda
</option>

<option>
Nick
</option>

<option>
Both
</option>


</select>



<button id="save-bill">
Save Bill
</button>


</div>





<div id="bill-list">

</div>


</div>








<!-- CALENDAR -->

<div id="calendar" class="page">


<h2>Calendar</h2>


<div class="card">

<p>
Bills calendar coming soon 🏡
</p>

</div>


</div>








<!-- SETTINGS -->

<div id="settings" class="page">


<h2>Settings</h2>


<div class="card">


<h3 id="account-name">
Account
</h3>


<button id="logout-btn">
Logout
</button>


</div>


</div>







<!-- NAVIGATION -->


<nav>


<button onclick="showPage('home')">
🏠
</button>


<button onclick="showPage('bills')">
💳
</button>


<button onclick="showPage('calendar')">
📅
</button>


<button onclick="showPage('settings')">
⚙️
</button>


</nav>




</section>



</div>





<script type="module" src="script.js"></script>


</body>

</html>
