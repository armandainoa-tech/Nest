<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nest 🏡</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

</head>


<body>


<div class="app">


<!-- LOGIN -->

<section id="login-screen">


<header>

<h1>NEST 🏡</h1>

<p>Armanda & Nick</p>

</header>



<div class="card">


<h2>Welcome Back</h2>


<input
id="email"
type="email"
placeholder="Email">



<input
id="password"
type="password"
placeholder="Password">



<button 
id="login-btn"
class="add-btn">

Login

</button>



<button
id="signup-btn"
class="secondary-btn">

Create Account

</button>



<p id="message"></p>


</div>


</section>








<!-- MAIN APP -->

<section id="app-screen" style="display:none;">



<header>

<h1>NEST 🏡</h1>

<p id="user-name">
Welcome
</p>

</header>






<!-- HOME -->

<section id="home" class="page active">


<h2>Home</h2>


<div class="card">

<h3>Remaining</h3>

<h1>$0.00</h1>

</div>




<div class="card">

<h3>Upcoming Bills</h3>

<p>No bills yet</p>

</div>


</section>








<!-- BILLS -->

<section id="bills" class="page">


<h2>Bills</h2>



<button 
class="add-btn"
id="open-bill">

+ Add Bill

</button>





<div 
id="bill-form"
class="card"
style="display:none;">



<h3>Add New Bill</h3>



<input
id="bill-name"
placeholder="Bill Name">



<input
id="bill-amount"
type="number"
placeholder="Amount">



<input
id="bill-date"
type="date">



<select id="bill-person">


<option>
Armanda
</option>


<option>
Nick
</option>


<option>
Both
</option>


</select>





<button
id="save-bill"
class="add-btn">

Save Bill

</button>



</div>





<div id="bill-list">

</div>


</section>








<!-- CALENDAR -->

<section id="calendar" class="page">


<h2>Calendar</h2>



<div class="card">

<p>Your bills will appear here.</p>

</div>


</section>








<!-- SETTINGS -->

<section id="settings" class="page">


<h2>Settings</h2>



<div class="card">


<h3 id="account-name">

Account

</h3>



<button
id="logout-btn"
class="secondary-btn">

Logout

</button>



</div>


</section>







<!-- NAVIGATION -->


<nav>


<button onclick="showPage('home')">

🏠

</button>



<button onclick="showPage('bills')">

💳

</button>



<button onclick="showPage('calendar')">

📅

</button>



<button onclick="showPage('settings')">

⚙️

</button>


</nav>




</section>



</div>





<script type="module" src="script.js"></script>


</body>

</html>
